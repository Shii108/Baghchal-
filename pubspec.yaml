name: baghchal_app
description: "A complete Baghchal game with AI, themes, statistics, haptics, and more."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  audioplayers: ^6.7.1
  flutter:
    sdk: flutter

  # Statistics storage
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/sounds/
